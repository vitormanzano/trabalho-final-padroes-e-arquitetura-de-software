services:
  db:
    image: postgres:16-alpine
    container_name: produtos_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-produtos}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-produtos}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
